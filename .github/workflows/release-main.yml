name: Release Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.release_id }}
      tag_name: ${{ steps.vars.outputs.tag_name }}
      release_name: ${{ steps.vars.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive release metadata
        id: vars
        run: |
          echo "package_version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "tag_name=main-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_name=Free Grind v$(jq -r '.version' package.json) (${GITHUB_SHA::7})" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.vars.outputs.tag_name }}',
              name: '${{ steps.vars.outputs.release_name }}',
              body: [
                'Automated release generated from a push to `main`.',
                '',
                `Commit: ${context.sha}`
              ].join('\n'),
              draft: true,
              prerelease: false,
              generate_release_notes: true
            });
            core.setOutput('release_id', String(data.id));

  publish-ota:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend bundle
        run: |
          bun run build
          tar -czf frontend.tar.gz -C dist .

      - name: Sign OTA bundle
        env:
          HOTSWAP_PRIVATE_KEY: ${{ secrets.HOTSWAP_PRIVATE_KEY }}
          HOTSWAP_PRIVATE_KEY_PASSWORD: ${{ secrets.HOTSWAP_PRIVATE_KEY_PASSWORD }}
        run: |
          bunx tauri signer sign frontend.tar.gz -k "$HOTSWAP_PRIVATE_KEY" -p "${HOTSWAP_PRIVATE_KEY_PASSWORD:-}"

      - name: Upload OTA bundle to backend
        id: ota-upload
        env:
          OTA_BACKEND_URL: ${{ secrets.OTA_BACKEND_URL }}
          OTA_BACKEND_TOKEN: ${{ secrets.OTA_BACKEND_TOKEN }}
        run: |
          BACKEND_URL="${OTA_BACKEND_URL%/}"
          OTA_VERSION="$(jq -r '.version' package.json)-ota.${GITHUB_RUN_NUMBER}"
          RESPONSE=$(curl --fail-with-body -sS -X POST "$BACKEND_URL/api/releases" \
            -H "Authorization: Bearer $OTA_BACKEND_TOKEN" \
            -F "channel=main" \
            -F "platform=all" \
            -F "arch=all" \
            -F "version=$OTA_VERSION" \
            -F "minBinaryVersion=$(jq -r '.version' package.json)" \
            -F "signature=$(cat frontend.tar.gz.sig)" \
            -F "notes=Automated OTA upload for ${GITHUB_SHA}" \
            -F "mandatory=false" \
            -F "bundleFile=@frontend.tar.gz;type=application/gzip")

          echo "$RESPONSE" > ota-upload-response.json
          echo "ota_version=$OTA_VERSION" >> "$GITHUB_OUTPUT"
          echo "ota_sequence=$(jq -r '.sequence' ota-upload-response.json)" >> "$GITHUB_OUTPUT"
          echo "ota_bundle_url=$(jq -r '.bundle_url' ota-upload-response.json)" >> "$GITHUB_OUTPUT"

      - name: Upload OTA artifacts to GitHub release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          OTA_VERSION: ${{ steps.ota-upload.outputs.ota_version }}
        with:
          script: |
            const fs = require('fs');

            const files = [
              {
                path: 'frontend.tar.gz',
                name: `frontend-${process.env.OTA_VERSION}.tar.gz`,
                contentType: 'application/gzip'
              },
              {
                path: 'frontend.tar.gz.sig',
                name: `frontend-${process.env.OTA_VERSION}.tar.gz.sig`,
                contentType: 'text/plain'
              }
            ];

            for (const file of files) {
              const data = fs.readFileSync(file.path);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: Number(process.env.RELEASE_ID),
                name: file.name,
                data,
                headers: {
                  'content-type': file.contentType,
                  'content-length': data.length
                }
              });
            }

  build-desktop:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            artifact_suffix: macos-universal
            bundle_dir: src-tauri/target/universal-apple-darwin/release/bundle
          - platform: windows-latest
            args: ""
            rust_targets: ""
            artifact_suffix: windows-x64
            bundle_dir: src-tauri/target/release/bundle
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build desktop artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: bunx tauri
          args: ${{ matrix.args }}

      - name: Upload desktop artifacts to release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          ARTIFACT_SUFFIX: ${{ matrix.artifact_suffix }}
          BUNDLE_DIR: ${{ matrix.bundle_dir }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const version = pkg.version;
            const suffix = process.env.ARTIFACT_SUFFIX;
            const bundleDir = process.env.BUNDLE_DIR;
            const releaseId = Number(process.env.RELEASE_ID);

            const mimeTypes = {
              '.dmg':    'application/x-apple-diskimage',
              '.gz':     'application/gzip',
              '.sig':    'text/plain',
              '.exe':    'application/vnd.microsoft.portable-executable',
              '.msi':    'application/x-msi',
            };

            // Collect installable bundles (skip updater-only .sig unless paired with bundle)
            const searchDirs = {
              'macos-universal': ['dmg', 'macos'],
              'windows-x64':     ['nsis', 'msi'],
            };

            const subDirs = searchDirs[suffix] ?? [];
            const uploads = [];

            for (const sub of subDirs) {
              const dir = path.join(bundleDir, sub);
              if (!fs.existsSync(dir)) continue;
              for (const file of fs.readdirSync(dir)) {
                const ext = path.extname(file);
                const doubleExt = file.endsWith('.tar.gz') ? '.tar.gz'
                                : file.endsWith('.tar.gz.sig') ? '.tar.gz.sig'
                                : null;
                const finalExt = doubleExt ?? ext;
                const mime = mimeTypes[finalExt] ?? mimeTypes[ext] ?? 'application/octet-stream';
                uploads.push({
                  src: path.join(dir, file),
                  name: `free-grind-v${version}-${suffix}${finalExt}`,
                  mime,
                });
              }
            }

            for (const { src, name, mime } of uploads) {
              const data = fs.readFileSync(src);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name,
                data,
                headers: { 'content-type': mime, 'content-length': data.length },
              });
              console.log(`✓ Uploaded ${name}`);
            }

  build-android:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools" \
            "ndk;29.0.14206865"

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Initialize Android project
        run: bunx tauri android init --ci --skip-targets-install

      - name: Add custom Android notification sound
        run: |
          mkdir -p src-tauri/gen/android/app/src/main/res/raw
          install -m 0644 src-tauri/sounds/free_grind_message.mp3 src-tauri/gen/android/app/src/main/res/raw/free_grind_message.mp3

      - name: Restore Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p src-tauri/certs
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > src-tauri/certs/free-grind-dev.jks

      - name: Build Android APK
        run: bunx tauri android build --apk -v

      - name: Upload Android APK to release
        uses: actions/github-script@v7
        env:
          RELEASE_NAME: ${{ needs.create-release.outputs.release_name }}
          PACKAGE_VERSION: ${{ needs.create-release.outputs.tag_name }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const apkPath = 'src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk';
            
            if (!fs.existsSync(apkPath)) {
              throw new Error(`APK not found at ${apkPath}`);
            }
            
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const version = pkg.version;
            const apkName = `free-grind-v${version}.apk`;
            
            const fileData = fs.readFileSync(apkPath);
            
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              name: apkName,
              data: fileData,
              headers: {
                'content-type': 'application/vnd.android.package-archive',
                'content-length': fileData.length
              }
            });
            
            console.log(`✓ APK uploaded to release as ${apkName}`);

  build-ios:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Initialize iOS project
        run: bunx tauri ios init --ci

      - name: Build iOS app without code signing
        id: ios_app
        run: |
          IOS_PROJECT_DIR="src-tauri/gen/apple"
          WORKSPACE_PATH=$(find "$IOS_PROJECT_DIR" -maxdepth 2 -name '*.xcworkspace' | head -n 1)
          XCODEPROJ_PATH=$(find "$IOS_PROJECT_DIR" -maxdepth 2 -name '*.xcodeproj' | head -n 1)

          if [ -n "$WORKSPACE_PATH" ]; then
            PROJECT_ARGS=(-workspace "$WORKSPACE_PATH")
          elif [ -n "$XCODEPROJ_PATH" ]; then
            PROJECT_ARGS=(-project "$XCODEPROJ_PATH")
          else
            echo "No Xcode workspace/project found under $IOS_PROJECT_DIR"
            exit 1
          fi

          SCHEME=$(xcodebuild "${PROJECT_ARGS[@]}" -list | awk '/Schemes:/ {flag=1; next} flag && NF {print $1; exit}')
          if [ -z "$SCHEME" ]; then
            echo "Failed to resolve iOS scheme"
            exit 1
          fi

          DERIVED_DATA_PATH="$RUNNER_TEMP/ios-derived"
          xcodebuild "${PROJECT_ARGS[@]}" \
            -scheme "$SCHEME" \
            -configuration release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            build

          APP_PATH=$(find "$DERIVED_DATA_PATH/Build/Products" -maxdepth 2 -type d -name '*.app' | grep -E '/(release|Release)-iphoneos/' | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No release .app artifact found in $DERIVED_DATA_PATH/Build/Products"
            exit 1
          fi

          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Package unsigned IPA
        id: ios_ipa
        run: |
          APP_PATH='${{ steps.ios_app.outputs.app_path }}'
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "Cannot package IPA; app bundle missing at $APP_PATH"
            exit 1
          fi

          PAYLOAD_DIR="$RUNNER_TEMP/Payload"
          IPA_PATH="$RUNNER_TEMP/free-grind-unsigned.ipa"

          rm -rf "$PAYLOAD_DIR"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"

          (
            cd "$RUNNER_TEMP"
            /usr/bin/zip -qry "$IPA_PATH" Payload
          )

          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload iOS IPA to release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          IPA_PATH: ${{ steps.ios_ipa.outputs.ipa_path }}
        with:
          script: |
            const fs = require('fs');

            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const version = pkg.version;
            const ipaPath = process.env.IPA_PATH;

            if (!ipaPath || !fs.existsSync(ipaPath)) {
              throw new Error(`IPA not found at ${ipaPath}`);
            }

            const ipaName = `free-grind-v${version}-unsigned.ipa`;
            const fileData = fs.readFileSync(ipaPath);

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              name: ipaName,
              data: fileData,
              headers: {
                'content-type': 'application/octet-stream',
                'content-length': fileData.length
              }
            });

            console.log(`✓ Unsigned iOS IPA uploaded to release as ${ipaName}`);


  publish-release:
    needs:
      - create-release
      - publish-ota
      - build-desktop
      - build-android
      - build-ios
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false,
              prerelease: false
            });
